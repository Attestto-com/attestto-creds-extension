name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Prepare WXT
        run: npx wxt prepare || true

      - name: Lint
        run: npm run lint:check

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
